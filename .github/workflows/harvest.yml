name: GRIT harvest

# Runs on the FREE GitHub-hosted runner (unlimited minutes on public repos).
# Only the clean ArcGIS API source harvests here. Scrape-tier sources (Accela,
# NSCB) are health-probed for reachability but harvested in a later/local wave.

on:
  schedule:
    - cron: '17 13 * * *'   # daily ~06:17 America/Las_Vegas (13:17 UTC)
  workflow_dispatch: {}       # run on demand from the Actions tab

permissions:
  contents: write             # allow committing refreshed data back to the repo

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Probe source health
        run: python -m grit health

      - name: Harvest live sources
        run: python -m grit harvest

      - name: Commit refreshed data
        run: |
          git config user.name  "grit-bot"
          git config user.email "grit-bot@users.noreply.github.com"
          git add docs/data/*.json
          git diff --staged --quiet || git commit -m "data: harvest $(date -u +%FT%TZ)"
          git push
