<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIT // Harvest Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Saira+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{--bg:#0a0b0d;--bg2:#101216;--panel:#14161b;--panel2:#181b21;--line:#23262e;--line2:#2d313a;
    --txt:#e6e8ec;--dim:#8b929c;--faint:#5a606b;--green:#3fb950;--amber:#d29922;--red:#f85149;--blue:#4493f8;
    --mono:'IBM Plex Mono',ui-monospace,monospace;--disp:'Saira Condensed',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:13px;line-height:1.45;min-height:100vh;
    background-image:radial-gradient(circle at 12% 0%,rgba(68,147,248,.04),transparent 45%),linear-gradient(0deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:auto,100% 3px;}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line2)}
  .top{display:flex;align-items:center;gap:16px;padding:0 18px;height:48px;border-bottom:1px solid var(--line);background:var(--bg2);position:sticky;top:0;z-index:1000}
  .brand{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:3px}.brand b{color:var(--blue)}
  .tag{font-size:10px;color:var(--faint);border:1px solid var(--line2);padding:2px 7px;letter-spacing:1px}
  .top .stamp{margin-left:auto;font-size:10px;color:var(--faint)}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 70px}
  h2.sec{font-family:var(--disp);font-size:13px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin:26px 0 12px;display:flex;align-items:center;gap:10px}
  h2.sec::after{content:'';flex:1;height:1px;background:var(--line)}
  .matrix{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
  .hcard{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--line2);padding:11px 13px}
  .hcard .hn{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .hdot{width:9px;height:9px;border-radius:50%;flex:none;background:var(--faint)}
  .hcard.live{border-left-color:var(--green)}.hcard.live .hdot{background:var(--green);box-shadow:0 0 7px var(--green)}
  .hcard.reachable{border-left-color:var(--blue)}.hcard.reachable .hdot{background:var(--blue)}
  .hcard.pending{border-left-color:var(--amber)}.hcard.pending .hdot{background:var(--amber)}
  .hcard.down{border-left-color:var(--red)}.hcard.down .hdot{background:var(--red)}
  .hcard .hname{font-size:12px;color:var(--txt);font-weight:500}
  .hcard .hmeta{font-size:10px;color:var(--faint);margin-top:3px;word-break:break-word}
  .hcard .hstat{margin-left:auto;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
  .kind{font-size:9px;color:var(--faint);border:1px solid var(--line2);padding:1px 5px;letter-spacing:.5px}
  #map{height:440px;border:1px solid var(--line);background:var(--bg2)}
  .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--bg2);color:var(--txt);border:1px solid var(--line2);border-radius:0;font-family:var(--mono)}
  .leaflet-popup-content{margin:10px 12px;font-size:12px}
  .pp-addr{font-size:13px;color:var(--txt);font-weight:600;margin-bottom:4px}
  .pp-k{color:var(--faint)} .pp-next{color:var(--amber);margin-top:6px}
  .pp a{color:var(--blue)}
  .leaflet-container{background:#0a0b0d}.leaflet-bar a{background:var(--panel2);color:var(--txt);border-color:var(--line2)}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:10px;color:var(--dim)}
  .legend span{display:inline-flex;align-items:center;gap:4px}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .tcount{font-family:var(--disp);font-size:15px;color:var(--txt);margin-right:6px}
  .filt{font-size:11px;color:var(--dim);border:1px solid var(--line2);background:var(--panel2);padding:4px 9px;cursor:pointer}
  .filt.on{border-color:var(--blue);color:#cfe2ff}
  .vtoggle{margin-left:auto;display:flex;gap:0;border:1px solid var(--line2)}
  .vtoggle button{font-family:var(--mono);font-size:11px;background:transparent;color:var(--dim);border:0;padding:5px 12px;cursor:pointer;letter-spacing:1px}
  .vtoggle button.on{background:var(--panel2);color:#cfe2ff}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--blue);padding:13px}
  .card .crow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .scorebox{font-family:var(--disp);font-size:24px;line-height:1;margin-left:auto}
  .s-hi{color:var(--green)}.s-mid{color:var(--amber)}.s-lo{color:var(--dim)}
  .addr{font-size:14px;color:var(--txt);font-weight:500}.apn{font-size:10px;color:var(--faint)}
  .kv{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);padding:2px 0}.kv b{color:var(--txt);font-weight:500}
  .tags{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
  .ttag{font-size:9px;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border:1px solid var(--line2);color:var(--dim)}
  .ttag.t{border-left-width:3px}
  .sig{font-size:10px;color:var(--dim);border-top:1px solid var(--line);margin-top:9px;padding-top:8px}.sig li{margin-left:14px;margin-bottom:2px}
  .next{font-size:11px;color:var(--amber);margin-top:8px}
  .cardlinks{margin-top:9px;display:flex;gap:10px}.cardlinks a{font-size:10px;color:var(--blue);text-decoration:none;border:1px solid var(--line2);padding:3px 7px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;font-size:9px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--line2);cursor:pointer;user-select:none}
  th:hover{color:var(--txt)}
  td{padding:8px 10px;border-bottom:1px solid var(--line);color:var(--dim)}
  tr:hover td{background:var(--panel)}
  td.num{text-align:right;color:var(--txt)}
  .scoredot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .empty{border:1px dashed var(--line2);padding:40px 20px;text-align:center;color:var(--faint);background:repeating-linear-gradient(45deg,transparent,transparent 9px,rgba(255,255,255,.01) 9px,rgba(255,255,255,.01) 18px)}
  .empty .big{font-family:var(--disp);font-size:22px;color:var(--dim);letter-spacing:1px;margin-bottom:8px}
  .empty code{color:var(--blue);background:var(--panel2);padding:1px 6px}
</style>
</head>
<body>
<div class="top">
  <div class="brand">GR<b>I</b>T</div>
  <div class="tag">HARVEST CONSOLE &middot; CLARK COUNTY</div>
  <div class="stamp" id="stamp">loading&hellip;</div>
</div>
<div class="wrap">
  <h2 class="sec">Lead Map</h2>
  <div id="map"></div>
  <div class="legend" id="legend"></div>
  <h2 class="sec">Source Health Matrix</h2>
  <div class="matrix" id="matrix"></div>
  <h2 class="sec">Leads <span id="harveststate" style="font-size:10px;color:var(--faint);letter-spacing:0;text-transform:none"></span></h2>
  <div class="toolbar" id="toolbar"></div>
  <div id="content"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const $=(s)=>document.querySelector(s);
const TRADE_COLORS={hvac:'#4a9d9c',roofing:'#a87455',plumbing:'#5d7fa3',electrical:'#b8923a',solar:'#c47f3d',landscaping:'#5f8f57',remodeling:'#8a6fa3',pest:'#8f8a5a',security:'#6a6f8f',pools:'#4a8fa3',concrete:'#888f96',fencing:'#9a7a5a'};
const ASSESSOR='https://maps.clarkcountynv.gov/assessor/AssessorParcelDetail/pcl.aspx';
let CARDS=[],FILTER=null,VIEW='map',SORT={k:'score',dir:-1},MAP=null,LAYER=null;
async function loadJSON(p){try{const r=await fetch(p,{cache:'no-store'});if(!r.ok)return null;return await r.json();}catch(e){return null;}}
function dot(s){return ['live','reachable','pending','down'].includes(s)?s:'pending';}
function scoreColor(n){return n>=60?'#3fb950':n>=30?'#d29922':'#5a606b';}
function leadColor(c){return (c.trade_tags&&c.trade_tags.length&&TRADE_COLORS[c.trade_tags[0]])||scoreColor(c.score);}
function scoreCls(n){return n>=60?'s-hi':n>=30?'s-mid':'s-lo';}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function row(k,v){return v?'<div class="kv"><span>'+k+'</span><b>'+esc(v)+'</b></div>':'';}
function filtered(){return FILTER?CARDS.filter(c=>(c.trade_tags||[]).includes(FILTER)):CARDS;}
function initMap(){MAP=L.map('map',{zoomControl:true}).setView([36.12,-115.17],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(MAP);
  LAYER=L.layerGroup().addTo(MAP);}
function renderMap(){if(!MAP)initMap();LAYER.clearLayers();const pts=[];
  filtered().filter(c=>c.lat&&c.lng).forEach(c=>{
    const m=L.circleMarker([c.lat,c.lng],{radius:6,color:leadColor(c),fillColor:leadColor(c),fillOpacity:.85,weight:1.5});
    m.bindPopup('<div class="pp">'+'<div class="pp-addr">'+esc(c.situs_address||'(address unknown)')+'</div>'+
      (c.owner_name?'<div><span class="pp-k">owner</span> '+esc(c.owner_name)+'</div>':'')+
      (c.assessed_value?'<div><span class="pp-k">value</span> '+esc(c.assessed_value)+'</div>':'')+
      (c.last_sale_date?'<div><span class="pp-k">last sale</span> '+esc(c.last_sale_date)+'</div>':'')+
      '<div><span class="pp-k">score</span> '+c.score+(c.trade_tags&&c.trade_tags.length?' &middot; '+c.trade_tags.join(', '):'')+'</div>'+
      (c.parcel_apn?'<div style="margin-top:5px"><a href="'+ASSESSOR+'" target="_blank" rel="noopener">Assessor lookup (APN '+esc(c.parcel_apn)+') &#8599;</a></div>':'')+
      (c.suggested_action?'<div class="pp-next">&#9656; '+esc(c.suggested_action)+'</div>':'')+'</div>');
    m.addTo(LAYER);pts.push([c.lat,c.lng]);});
  if(pts.length)MAP.fitBounds(pts,{padding:[30,30],maxZoom:14});
  const used=[...new Set(CARDS.flatMap(c=>c.trade_tags||[]))];
  $('#legend').innerHTML=used.length?used.map(t=>'<span><i style="background:'+(TRADE_COLORS[t]||'#888')+'"></i>'+t+'</span>').join('')+'<span style="color:var(--faint)">&middot; untagged colored by score</span>':'<span style="color:var(--faint)">dots colored by score until trade data populates</span>';}
function renderHealth(h){const m=$('#matrix');
  if(!h||!h.sources){m.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="big">HEALTH NOT YET PROBED</div>Trigger the GitHub Action (Actions tab &rarr; Run workflow).</div>';return;}
  m.innerHTML=h.sources.map(s=>{const cls=dot(s.status);
    const meta=[s.note,s.error?('ERR: '+s.error):'',s.latency_ms!=null?(s.latency_ms+'ms'):'',s.records!=null?(s.records+' items'):''].filter(Boolean).join(' \u00b7 ');
    return '<div class="hcard '+cls+'"><div class="hn"><span class="hdot"></span><span class="hname">'+esc(s.name)+'</span><span class="hstat">'+s.status+'</span></div><div><span class="kind">'+s.kind+'</span> <span class="kind">'+s.tier+'</span></div><div class="hmeta">'+esc(meta)+'</div></div>';}).join('');
  if(h.generated_at)$('#stamp').textContent='health '+h.generated_at;}
function cardHTML(c){const sig=(c.signals||[]).map(s=>'<li>'+esc(s)+'</li>').join('');
  return '<div class="card" style="border-top-color:'+leadColor(c)+'"><div class="crow"><span class="addr">'+esc(c.situs_address||'(address unknown)')+'</span><span class="scorebox '+scoreCls(c.score)+'">'+c.score+'</span></div>'+
    '<div class="apn">APN '+esc(c.parcel_apn||'\u2014')+' \u00b7 '+esc(c.city||'')+' '+esc(c.zip||'')+'</div>'+
    '<div class="tags">'+(c.trade_tags||[]).map(t=>'<span class="ttag t" style="border-left-color:'+(TRADE_COLORS[t]||'#888')+';color:'+(TRADE_COLORS[t]||'#888')+'">'+t+'</span>').join('')+'</div>'+
    row('Owner',c.owner_name)+row('Owner mailing',c.owner_mailing)+row('Land use',c.land_use)+row('Assessed value',c.assessed_value)+row('Last sale',c.last_sale_date)+
    (sig?'<ul class="sig">'+sig+'</ul>':'')+(c.suggested_action?'<div class="next">&#9656; '+esc(c.suggested_action)+'</div>':'')+
    (c.parcel_apn?'<div class="cardlinks"><a href="'+ASSESSOR+'" target="_blank" rel="noopener">Assessor &#8599;</a></div>':'')+'</div>';}
function tableHTML(){const cols=[['score','SCORE'],['trade','TRADE'],['situs_address','ADDRESS'],['owner_name','OWNER'],['assessed_value','VALUE'],['city','CITY']];
  const rows=filtered().slice().sort((a,b)=>{
    let k=SORT.k,va,vb;
    if(k==='trade'){va=(a.trade_tags||[])[0]||'';vb=(b.trade_tags||[])[0]||'';}
    else{va=a[k]==null?'':a[k];vb=b[k]==null?'':b[k];}
    if(k==='score'||k==='assessed_value'){va=parseFloat(String(va).replace(/[^0-9.]/g,''))||0;vb=parseFloat(String(vb).replace(/[^0-9.]/g,''))||0;}
    return (va<vb?-1:va>vb?1:0)*SORT.dir;});
  return '<table><thead><tr>'+cols.map(c=>'<th data-k="'+c[0]+'">'+c[1]+(SORT.k===c[0]?(SORT.dir>0?' \u25b2':' \u25bc'):'')+'</th>').join('')+'<th></th></tr></thead><tbody>'+
    rows.map(c=>'<tr><td class="num"><span class="scoredot" style="background:'+leadColor(c)+'"></span>'+c.score+'</td>'+
      '<td>'+((c.trade_tags||[])[0]||'\u2014')+'</td><td style="color:var(--txt)">'+esc(c.situs_address||'(unknown)')+'</td>'+
      '<td>'+esc(c.owner_name||'\u2014')+'</td><td class="num">'+esc(c.assessed_value||'\u2014')+'</td><td>'+esc(c.city||'\u2014')+'</td>'+
      '<td>'+(c.parcel_apn?'<a href="'+ASSESSOR+'" target="_blank" rel="noopener" style="color:var(--blue)">&#8599;</a>':'')+'</td></tr>').join('')+'</tbody></table>';}
function renderContent(){const wrap=$('#content');
  if(!CARDS.length){wrap.innerHTML='<div class="empty"><div class="big">NO HARVEST YET</div>The engine now samples multiple owner/address sources and uses the richest. Trigger a harvest: <b>Actions tab &rarr; "GRIT harvest" &rarr; Run workflow</b>. Real data only.</div>';return;}
  if(VIEW==='map'){wrap.innerHTML='<div class="grid">'+filtered().map(cardHTML).join('')+'</div>';}
  else{wrap.innerHTML=tableHTML();wrap.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;SORT.dir=(SORT.k===k?-SORT.dir:-1);SORT.k=k;renderContent();});}}
function renderToolbar(){const tb=$('#toolbar');const trades=[...new Set(CARDS.flatMap(c=>c.trade_tags||[]))].sort();
  tb.innerHTML='<span class="tcount">'+filtered().length+' leads</span>'+
    (trades.length?'<span class="filt '+(!FILTER?'on':'')+'" data-t="">all</span>'+trades.map(t=>'<span class="filt '+(FILTER===t?'on':'')+'" data-t="'+t+'">'+t+'</span>').join(''):'')+
    '<span class="vtoggle"><button data-v="map" class="'+(VIEW==='map'?'on':'')+'">MAP CARDS</button><button data-v="list" class="'+(VIEW==='list'?'on':'')+'">LIST</button></span>';
  tb.querySelectorAll('.filt').forEach(el=>el.onclick=()=>{FILTER=el.dataset.t||null;renderToolbar();renderContent();renderMap();});
  tb.querySelectorAll('.vtoggle button').forEach(el=>el.onclick=()=>{VIEW=el.dataset.v;renderToolbar();renderContent();});}
(async()=>{initMap();renderHealth(await loadJSON('data/health.json'));
  const cd=await loadJSON('data/cards.json');CARDS=(cd&&cd.cards)||[];
  if(cd&&cd.harvest){const h=cd.harvest;$('#harveststate').textContent=h.layer?'\u00b7 source: '+(h.source_name||h.layer)+(h.vintage?' ('+h.vintage+')':'')+' \u00b7 '+cd.count+' leads':'\u00b7 '+(h.status||'')+' '+(h.detail||'');}
  renderToolbar();renderContent();renderMap();})();
</script>
</body>
</html>
