<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIT // Intelligence Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Saira+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{--bg:#0a0b0d;--bg2:#101216;--panel:#14161b;--panel2:#181b21;--line:#23262e;--line2:#2d313a;
    --txt:#e6e8ec;--dim:#8b929c;--faint:#5a606b;--green:#3fb950;--amber:#d29922;--red:#f85149;--blue:#4493f8;
    --import:#e0833d;--local:#4493f8;--violet:#8a6fa3;--teal:#4a9d9c;
    --mono:'IBM Plex Mono',ui-monospace,monospace;--disp:'Saira Condensed',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:13px;line-height:1.45;min-height:100vh;
    background-image:radial-gradient(circle at 12% 0%,rgba(68,147,248,.04),transparent 45%),radial-gradient(circle at 88% 0%,rgba(224,131,61,.035),transparent 45%),linear-gradient(0deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:auto,auto,100% 3px;}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line2)}::-webkit-scrollbar-track{background:transparent}
  a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
  /* top bar */
  .top{display:flex;align-items:center;gap:16px;padding:0 18px;height:48px;border-bottom:1px solid var(--line);background:var(--bg2);position:sticky;top:0;z-index:1200}
  .brand{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:3px}.brand b{color:var(--blue)}
  .tag{font-size:10px;color:var(--faint);border:1px solid var(--line2);padding:2px 7px;letter-spacing:1px}
  .top .stamp{margin-left:auto;font-size:10px;color:var(--faint)}
  /* KPI strip */
  .kpis{display:flex;gap:0;flex-wrap:wrap;border-bottom:1px solid var(--line);background:var(--bg2)}
  .kpi{flex:1 1 0;min-width:120px;padding:10px 16px;border-right:1px solid var(--line);cursor:default}
  .kpi.clk{cursor:pointer}.kpi.clk:hover{background:var(--panel)}
  .kpi .v{font-family:var(--disp);font-size:23px;letter-spacing:.5px;color:var(--txt);line-height:1}
  .kpi .l{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);margin-top:5px}
  .kpi .s{font-size:10px;color:var(--dim);margin-top:2px}
  .kpi.k-import .v{color:var(--import)}.kpi.k-permit .v{color:var(--green)}
  /* tabs */
  .tabs{display:flex;gap:0;flex-wrap:wrap;padding:0 12px;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:48px;z-index:1100}
  .tab{font-family:var(--disp);font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;user-select:none}
  .tab:hover{color:var(--dim)}.tab.on{color:var(--txt);border-bottom-color:var(--blue)}
  .tab .b{font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:6px}
  .tab.on .b{color:var(--blue)}
  .wrap{max-width:1340px;margin:0 auto;padding:16px 18px 80px}
  .view{display:none}.view.on{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  h2.sec{font-family:var(--disp);font-size:13px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:10px}
  h2.sec:first-child{margin-top:6px}
  h2.sec::after{content:'';flex:1;height:1px;background:var(--line)}
  h2.sec .note{font-family:var(--mono);font-size:10px;letter-spacing:0;text-transform:none;color:var(--faint)}
  /* filter / toolbar */
  .toolbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  .tcount{font-family:var(--disp);font-size:15px;color:var(--txt);margin-right:6px}
  .filt{font-size:11px;color:var(--dim);border:1px solid var(--line2);background:var(--panel2);padding:4px 9px;cursor:pointer;white-space:nowrap}
  .filt.on{border-color:var(--blue);color:#cfe2ff}
  .btn{font-size:11px;color:var(--dim);border:1px solid var(--line2);background:var(--panel2);padding:4px 10px;cursor:pointer;letter-spacing:.5px;white-space:nowrap}
  .btn:hover{border-color:var(--blue);color:#cfe2ff}
  .sub{font-size:10px;color:var(--faint);margin:0 3px}
  /* facets */
  .facets{border:1px solid var(--line);background:var(--bg2);margin-bottom:12px}
  .facets summary{cursor:pointer;padding:8px 12px;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim);list-style:none;display:flex;align-items:center;gap:8px}
  .facets summary::-webkit-details-marker{display:none}
  .facets summary::before{content:'▸';color:var(--faint)}.facets[open] summary::before{content:'▾'}
  .facets summary b{color:var(--blue);font-family:var(--mono)}
  .fgrid{padding:4px 12px 12px}
  .fgroup{margin-top:9px}
  .fgroup .fh{font-size:9px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;margin-bottom:5px}
  .fchips{display:flex;gap:5px;flex-wrap:wrap}
  .fchip{font-size:10px;color:var(--dim);border:1px solid var(--line2);padding:2px 7px;cursor:pointer;background:var(--panel)}
  .fchip:hover{border-color:var(--line2);color:var(--txt)}
  .fchip.on{border-color:var(--blue);color:#cfe2ff;background:rgba(68,147,248,.12)}
  .fchip .n{color:var(--faint);margin-left:4px}.fchip.on .n{color:#9cc2ff}
  .fchip.og.on{border-color:var(--import);color:#f0b483;background:rgba(224,131,61,.12)}
  /* map + list split */
  .split{display:flex;gap:12px;align-items:stretch}
  .pane-map{flex:1 1 56%;min-width:340px;display:flex;flex-direction:column}
  .pane-list{flex:1 1 44%;min-width:320px;display:flex;flex-direction:column;border:1px solid var(--line);background:var(--bg2)}
  #map{height:520px;border:1px solid var(--line);background:var(--bg2)}
  .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--bg2);color:var(--txt);border:1px solid var(--line2);border-radius:0;font-family:var(--mono)}
  .leaflet-popup-content{margin:10px 12px;font-size:12px}.pp-addr{font-size:13px;color:var(--txt);font-weight:600;margin-bottom:4px}
  .pp-k{color:var(--faint)}.pp-next{color:var(--amber);margin-top:6px}
  .pp .det{margin-top:7px}.pp .det b{font-size:10px;letter-spacing:.5px;color:var(--blue);border:1px solid var(--line2);padding:2px 7px;cursor:pointer}
  .leaflet-container{background:#0a0b0d}.leaflet-bar a{background:var(--panel2);color:var(--txt);border-color:var(--line2)}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:10px;color:var(--dim)}
  .legend span{display:inline-flex;align-items:center;gap:4px}.legend i{width:9px;height:9px;border-radius:50%;display:inline-block}
  .mapnote{font-size:10px;color:var(--amber);background:rgba(210,153,34,.08);border:1px solid rgba(210,153,34,.25);padding:6px 9px;margin-top:8px}
  .mapnote.ok{color:var(--green);background:rgba(63,185,80,.07);border-color:rgba(63,185,80,.25)}
  /* playback bar */
  .pb{border:1px solid var(--line);background:var(--bg2);margin-top:10px;padding:10px 12px}
  .pb-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .pb-play{font-family:var(--disp);font-size:13px;letter-spacing:1px;color:var(--txt);border:1px solid var(--line2);background:var(--panel2);padding:5px 14px;cursor:pointer;min-width:74px;text-align:center}
  .pb-play:hover{border-color:var(--blue);color:#cfe2ff}.pb-play.playing{border-color:var(--green);color:#9be0a8}
  .pb-track{flex:1 1 240px;-webkit-appearance:none;appearance:none;height:4px;background:var(--line2);outline:none;cursor:pointer}
  .pb-track::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 0 6px rgba(68,147,248,.6)}
  .pb-track::-moz-range-thumb{width:14px;height:14px;border:0;border-radius:50%;background:var(--blue);cursor:pointer}
  .pb-cursor{font-family:var(--disp);font-size:17px;color:var(--txt);min-width:118px;text-align:right;letter-spacing:.5px}
  .pb-gran{display:flex;gap:0;border:1px solid var(--line2)}
  .pb-gran span{font-size:10px;color:var(--dim);padding:4px 9px;cursor:pointer;border-right:1px solid var(--line2)}
  .pb-gran span:last-child{border-right:0}.pb-gran span.on{background:var(--blue);color:#fff}
  .pb-meta{font-size:10px;color:var(--faint);margin-top:7px}
  .pb-meta b{color:var(--dim)}
  /* list */
  .lhead{display:flex;font-size:9px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;border-bottom:1px solid var(--line2);background:var(--panel)}
  .lhead div{padding:8px 8px;cursor:pointer;user-select:none}.lhead div:hover{color:var(--txt)}
  .lbody{overflow-y:auto;height:480px}
  .lrow{display:flex;align-items:center;border-bottom:1px solid var(--line);cursor:pointer;font-size:11px}
  .lrow:hover{background:var(--panel)}.lrow.sel{background:rgba(68,147,248,.14);outline:1px solid var(--blue)}
  .lrow div{padding:7px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .c-score{width:50px;flex:none;text-align:right;color:var(--txt)}
  .c-addr{flex:1 1 40%;color:var(--txt)}.c-owner{flex:1 1 34%;color:var(--dim)}
  .c-ent{width:64px;flex:none;font-size:10px;letter-spacing:.5px}.c-trade{width:66px;flex:none;color:var(--dim)}.c-val{width:70px;flex:none;text-align:right}
  .scoredot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .oos{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--import);margin-left:4px;vertical-align:middle}
  /* generic table */
  .tbl{width:100%;border-collapse:collapse;font-size:11px}
  .tbl th{text-align:left;font-size:9px;letter-spacing:1px;color:var(--faint);padding:7px 9px;border-bottom:1px solid var(--line2);text-transform:uppercase;background:var(--panel);position:sticky;top:0;cursor:pointer;user-select:none}
  .tbl th:hover{color:var(--txt)}
  .tbl td{padding:7px 9px;border-bottom:1px solid var(--line);color:var(--txt)}
  .tbl tr:hover td{background:var(--panel)}
  .tbl .num{text-align:right;color:var(--dim);font-variant-numeric:tabular-nums}
  .tbl .nm{color:var(--txt);max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tbl .mut{color:var(--dim)}
  .tblwrap{border:1px solid var(--line);background:var(--bg2);max-height:560px;overflow:auto}
  .bar{display:inline-block;height:8px;background:var(--blue);vertical-align:middle;border-radius:1px}
  .bar.imp{background:var(--import)}
  .kind{font-size:9px;color:var(--faint);border:1px solid var(--line2);padding:1px 5px;letter-spacing:.5px}
  .clickrow{cursor:pointer}
  /* health matrix */
  .matrix{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:10px}
  .hcard{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--line2);padding:11px 13px}
  .hcard .hn{display:flex;align-items:center;gap:8px;margin-bottom:6px}.hdot{width:9px;height:9px;border-radius:50%;flex:none;background:var(--faint)}
  .hcard.live{border-left-color:var(--green)}.hcard.live .hdot{background:var(--green);box-shadow:0 0 7px var(--green)}
  .hcard.reachable{border-left-color:var(--blue)}.hcard.reachable .hdot{background:var(--blue)}
  .hcard.pending{border-left-color:var(--amber)}.hcard.pending .hdot{background:var(--amber)}
  .hcard.planned{border-left-color:var(--faint)}.hcard.planned .hdot{background:var(--faint)}
  .hcard.down{border-left-color:var(--red)}.hcard.down .hdot{background:var(--red)}
  .hcard .hname{font-size:12px;color:var(--txt);font-weight:500}.hcard .hmeta{font-size:10px;color:var(--faint);margin-top:5px;word-break:break-word;line-height:1.5}
  .hcard .hstat{margin-left:auto;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
  .hcard .hbar{margin-top:7px;height:4px;background:var(--line2)}.hcard .hbar i{display:block;height:4px;background:var(--green)}
  .hrowmeta{display:flex;gap:12px;font-size:10px;color:var(--dim);margin-top:6px;flex-wrap:wrap}
  .hrowmeta b{color:var(--txt)}
  /* cards / kpis inner */
  .statgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px}
  .stat{border:1px solid var(--line);background:var(--panel);padding:11px 13px}
  .stat .v{font-family:var(--disp);font-size:21px;color:var(--txt)}.stat.imp .v{color:var(--import)}.stat.loc .v{color:var(--local)}
  .stat .l{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin-top:4px}
  /* empty */
  .empty{border:1px dashed var(--line2);padding:40px 20px;text-align:center;color:var(--faint);background:repeating-linear-gradient(45deg,transparent,transparent 9px,rgba(255,255,255,.01) 9px,rgba(255,255,255,.01) 18px)}
  .empty .big{font-family:var(--disp);font-size:22px;color:var(--dim);letter-spacing:1px;margin-bottom:8px}
  /* pills */
  .pill{display:inline-block;font-size:9px;letter-spacing:.5px;padding:1px 5px;margin-right:4px;border:1px solid var(--line2);color:var(--dim);vertical-align:middle}
  .pill.t-IMMEDIATE{color:#7be08c;border-color:#2e6b35}
  .pill.t-WARM{color:#e8b56d;border-color:#6b4f23}
  .pill.t-PERSISTENT{color:#9ab8de;border-color:#34465f}
  .pill.t-HISTORICAL{color:#9aa1ad;border-color:#3a3f48}
  .pill.t-STRUCTURAL{color:#7c828c;border-color:#2b2f36}
  .pill.port{color:#c47f3d;border-color:#6a4520;font-weight:600}
  .pill.imp{color:var(--import);border-color:#7a4a20;font-weight:600}
  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1400;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(480px,94vw);background:var(--bg2);border-left:1px solid var(--line2);z-index:1500;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-12px 0 40px rgba(0,0,0,.5)}
  .drawer.open{transform:none}
  .dr-head{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--line);padding:14px 16px;z-index:2}
  .dr-x{position:absolute;top:12px;right:14px;font-size:18px;color:var(--faint);cursor:pointer;line-height:1}.dr-x:hover{color:var(--txt)}
  .dr-addr{font-family:var(--disp);font-size:20px;letter-spacing:.5px;color:var(--txt);padding-right:24px}
  .dr-score{font-family:var(--disp);font-size:13px;color:var(--blue);margin-top:2px}
  .dr-body{padding:6px 16px 40px}
  .dr-sec{margin-top:16px}
  .dr-h{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--faint);margin-bottom:7px;border-bottom:1px solid var(--line);padding-bottom:4px}
  .dims{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line)}
  .dim{background:var(--panel);padding:8px 10px}
  .dim .dk{font-size:9px;letter-spacing:.5px;color:var(--faint);text-transform:uppercase}
  .dim .dv{font-size:12px;color:var(--txt);margin-top:2px;word-break:break-word}
  .dim.import{border-left:2px solid var(--import)}.dim.import .dv{color:var(--import)}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:3px 0;font-size:12px;border-bottom:1px dotted var(--line)}
  .kv .k{color:var(--faint)}.kv .v{color:var(--txt);text-align:right}
  .why-box{background:rgba(68,147,248,.05);border:1px solid rgba(68,147,248,.22);border-left:3px solid var(--blue);padding:11px 13px;font-size:12px;line-height:1.65;color:var(--txt)}
  .tagchips{display:flex;flex-wrap:wrap;gap:5px}
  .tc{font-size:10px;color:var(--dim);border:1px solid var(--line2);padding:2px 7px;background:var(--panel)}
  .tc.ns-monetization{border-color:#5a4a2a;color:#e0b877}
  .tc.ns-distress{border-color:#6a2f2f;color:#e88}
  .tc.ns-origin{border-color:#7a4a20;color:#f0b483}
  .tc.ns-ownership{border-color:#34465f;color:#9ab8de}
  .tl{position:relative;padding-left:14px}
  .tl::before{content:'';position:absolute;left:3px;top:3px;bottom:3px;width:1px;background:var(--line2)}
  .tlitem{position:relative;padding:0 0 11px 0;font-size:11px}
  .tlitem::before{content:'';position:absolute;left:-14px;top:4px;width:7px;height:7px;border-radius:50%;background:var(--blue);border:2px solid var(--bg2)}
  .tlitem .td{color:var(--faint);font-size:10px}.tlitem .tk{color:var(--txt)}
  .sig{font-size:11px;color:var(--dim);padding:2px 0}
  .dr-link{display:inline-block;margin-top:8px;font-size:11px}
  /* date-first */
  .c-age{width:60px;flex:none;text-align:right;font-variant-numeric:tabular-nums}
  .age{font-size:10px;letter-spacing:.3px;padding:1px 5px;border:1px solid var(--line2);color:var(--dim);white-space:nowrap}
  .age.u-hot{color:#7be08c;border-color:#2e6b35;background:rgba(63,185,80,.08)}
  .age.u-warm{color:#e8b56d;border-color:#6b4f23}
  .age.u-recent{color:#9ab8de;border-color:#34465f}
  .age.u-aging{color:#9aa1ad;border-color:#3a3f48}
  .age.u-stale{color:#7c828c;border-color:#2b2f36}
  .age.u-none{color:var(--faint);border-color:transparent}
  .urg-banner{display:flex;align-items:center;gap:9px;padding:9px 12px;margin-top:4px;border:1px solid var(--line2);border-left:3px solid var(--faint)}
  .urg-banner.u-hot{border-left-color:var(--green);background:rgba(63,185,80,.06)}
  .urg-banner.u-warm{border-left-color:var(--amber);background:rgba(210,153,34,.05)}
  .urg-banner.u-recent{border-left-color:var(--blue)}
  .urg-banner .ue{font-family:var(--disp);font-size:16px;letter-spacing:.5px;color:var(--txt)}
  .urg-banner .ua{margin-left:auto;font-family:var(--disp);font-size:15px;color:var(--dim)}
  .datesgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line)}
  .dcell{background:var(--panel);padding:7px 10px}.dcell .dk{font-size:9px;letter-spacing:.5px;color:var(--faint);text-transform:uppercase}.dcell .dv{font-size:12px;color:var(--txt);margin-top:1px}
  /* audit: signal matrix + status tables */
  .sigmatrix{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
  .sigcard{border:1px solid var(--line);border-left:3px solid var(--faint);background:var(--panel);padding:9px 11px}
  .sigcard.implemented{border-left-color:var(--green)}.sigcard.partial{border-left-color:var(--amber)}.sigcard.missing{border-left-color:var(--faint);opacity:.8}
  .sigcard .sn{font-size:12px;color:var(--txt);display:flex;justify-content:space-between;gap:6px;align-items:center}
  .sigcard .sst{font-size:8px;letter-spacing:.8px;padding:1px 5px;border:1px solid var(--line2);color:var(--dim)}
  .sigcard.implemented .sst{color:#7be08c;border-color:#2e6b35}.sigcard.partial .sst{color:#e8b56d;border-color:#6b4f23}
  .sigcard .smeta{font-size:9px;color:var(--faint);margin-top:5px;line-height:1.5}
  .sigcard .pri{font-size:8px;letter-spacing:.5px;color:var(--faint)}.sigcard .pri.HIGH{color:#e88}
  .stbadge{font-size:8px;letter-spacing:.8px;padding:2px 6px;border:1px solid var(--line2);white-space:nowrap}
  .stbadge.WORKING{color:#7be08c;border-color:#2e6b35}.stbadge.PARTIAL{color:#e8b56d;border-color:#6b4f23}
  .stbadge.BROKEN{color:var(--red);border-color:#6a2f2f}.stbadge.NOT{color:var(--faint)}
  .qbar{height:5px;background:var(--line2);margin-top:3px}.qbar i{display:block;height:5px;background:var(--green)}
  .flag{font-size:11px;padding:5px 9px;border:1px solid var(--line2);border-left:3px solid var(--amber);margin-bottom:5px;color:var(--dim)}
  .flag.high{border-left-color:var(--red)}.flag b{color:var(--txt)}
  .gap{font-size:12px;padding:7px 11px;border:1px solid var(--line);border-left:3px solid var(--amber);margin-bottom:6px}
  .gap.HIGH{border-left-color:var(--red)}.gap .gp{font-size:9px;letter-spacing:1px;color:var(--faint)}.gap b{color:var(--txt)}.gap .gi{color:var(--dim);font-size:11px;margin-top:2px}
  .roadmap li{font-size:12px;color:var(--dim);margin:5px 0 5px 18px}

  @media(max-width:860px){.split{flex-direction:column}#map{height:380px}.lbody{height:340px}.dims,.datesgrid{grid-template-columns:1fr}.kpi{min-width:33%}}
</style>
</head>
<body>
<div class="top">

  <div class="tag" id="ver">INTELLIGENCE CONSOLE · SOUTHERN NEVADA · v0.112</div>

</div>
<div class="kpis" id="kpis"></div>
<div class="tabs" id="tabs"></div>

<div class="wrap">
  <!-- MAP / PLAYBACK -->
  <section class="view on" id="v-map">
    <div class="toolbar" id="toolbar"></div>
    <details class="facets" id="facetbox"><summary>tag facets <b id="facetcount"></b></summary><div class="fgrid" id="facets"></div></details>
    <div class="split">
      <div class="pane-map">
        <div id="map"></div>

    </div>
  </section>

  <!-- LEADS (full list) -->
  <section class="view" id="v-leads">
    <div class="toolbar" id="toolbar2"></div>

</div>

<!-- lead drawer -->
<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"><div id="drawer-inner"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const $=(s)=>document.querySelector(s);const $$=(s)=>[...document.querySelectorAll(s)];
const TRADE_COLORS={hvac:'#4a9d9c',roofing:'#a87455',plumbing:'#5d7fa3',electrical:'#b8923a',solar:'#c47f3d',landscaping:'#5f8f57',remodeling:'#8a6fa3',pest:'#8f8a5a',security:'#6a6f8f',pools:'#4a8fa3',concrete:'#888f96',fencing:'#9a7a5a',sign:'#9a8f5a',patio:'#7a8f6a'};
const ENTITY_COLORS={PERSON:'#4493f8',LLC:'#c47f3d',TRUST:'#6fb3b8',COMMERCIAL:'#8a6fa3',HOA:'#5a606b',GOVERNMENT:'#5a606b',UNKNOWN:'#5a606b'};
const ENTITY_HIDE_DEFAULT=new Set(['HOA','GOVERNMENT']);
const NS_LABELS={trade:'Trade',entity:'Entity',ownership:'Ownership',permit:'Permit','real-estate':'Real Estate',value:'Value',temporal:'Recency',geo:'Geography',distress:'Distress',security:'Security','economic-activity':'Economic Activity',monetization:'Monetization',contractor:'Contractor',origin:'Owner Origin'};
const NS_ORDER=['monetization','origin','ownership','distress','permit','trade','temporal','real-estate','value','entity','geo','security','economic-activity','contractor'];
const ASSESSOR='https://maps.clarkcountynv.gov/assessor/AssessorParcelDetail/pcl.aspx';
let HIDE_NONLEAD=true;
let CARDS=[],OPERATORS=[],CONTRACTORS=[],COV=null,HARVEST=null;
let FILTER=null,TFILTER=null,OPFILTER=null,ORIGIN_FILTER=null,TAGSET=new Set(),SORT={k:'score',dir:-1};
let MAP=null,LAYER=null,PLAYLAYER=null,MARKERS={},SEL=null,RENDERED={};
async function loadJSON(p){try{const r=await fetch(p,{cache:'no-store'});if(!r.ok)return null;return await r.json();}catch(e){return null;}}
function dot(s){return ['live','reachable','pending','planned','down'].includes(s)?s:'pending';}
function scoreColor(n){return n>=60?'#3fb950':n>=30?'#d29922':'#5a606b';}
function leadColor(c){return (c.trade_tags&&c.trade_tags.length&&TRADE_COLORS[c.trade_tags[0]])||(c.entity_type&&ENTITY_COLORS[c.entity_type])||scoreColor(c.score);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function num(v){return parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,''))||0;}
function money(n){n=+n||0;return n>=1e6?('$'+(n/1e6).toFixed(1)+'M'):n>=1e3?('$'+Math.round(n/1e3)+'k'):('$'+Math.round(n));}
function p0(n){return (Math.round(n)).toLocaleString();}

/* ---------- filtering ---------- */
function filtered(){let l=CARDS.slice();
  if(HIDE_NONLEAD && !OPFILTER)l=l.filter(c=>!ENTITY_HIDE_DEFAULT.has(c.entity_type||'UNKNOWN'));
  if(FILTER)l=l.filter(c=>(c.trade_tags||[]).includes(FILTER));
  if(TFILTER)l=l.filter(c=>c.temporal_state===TFILTER);
  if(OPFILTER)l=l.filter(c=>c.operator_id===OPFILTER);
  if(TAGSET.size)l=l.filter(c=>{const t=new Set(c.tags||[]);for(const tag of TAGSET)if(!t.has(tag))return false;return true;});
  const k=SORT.k;l.sort((a,b)=>{let va,vb;
    if(k==='trade'){va=(a.trade_tags||[])[0]||'';vb=(b.trade_tags||[])[0]||'';}
    else if(k==='age_days'){va=(a.age_days==null?1e9:a.age_days);vb=(b.age_days==null?1e9:b.age_days);}
    else if(k==='score'||k==='assessed_value'){va=num(a[k]);vb=num(b[k]);}
    else{va=a[k]==null?'':String(a[k]);vb=b[k]==null?'':String(b[k]);}
    return (va<vb?-1:va>vb?1:0)*SORT.dir;});return l;}

/* ---------- map ---------- */
function initMap(){MAP=L.map('map',{zoomControl:true,preferCanvas:true}).setView([36.12,-115.17],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(MAP);
  LAYER=L.layerGroup().addTo(MAP);PLAYLAYER=L.layerGroup();}
function popupHTML(c){
  const badges=(c.temporal_state?'<span class="pill t-'+c.temporal_state+'">'+c.temporal_state+'</span>':'')+
               (c.portfolio_size>1?'<span class="pill port">PORTFOLIO '+c.portfolio_size+'</span>':'')+
               (c.owner_out_of_state?'<span class="pill imp">'+esc(c.owner_origin_market||'OUT-OF-STATE')+'</span>':'');
  return '<div class="pp"><div class="pp-addr">'+esc(c.situs_address||'(address unknown)')+'</div>'+
  (badges?'<div style="margin-bottom:4px">'+badges+'</div>':'')+
  (c.owner_name?'<div><span class="pp-k">owner</span> '+esc(c.owner_name)+'</div>':'')+
  (c.assessed_value?'<div><span class="pp-k">value</span> '+esc(c.assessed_value)+'</div>':'')+
  '<div><span class="pp-k">score</span> '+c.score+(c.trade_tags&&c.trade_tags.length?' · '+c.trade_tags.join(', '):'')+'</div>'+
  '<div class="det"><b data-det="'+esc(c.id)+'">OPEN LEAD DETAIL ›</b></div></div>';}
function renderMap(){if(!MAP)initMap();LAYER.clearLayers();MARKERS={};const pts=[];
  filtered().filter(c=>c.lat&&c.lng).forEach(c=>{
    const oos=c.owner_out_of_state;
    const m=L.circleMarker([c.lat,c.lng],{radius:oos?6.5:6,color:oos?'#e0833d':leadColor(c),fillColor:leadColor(c),fillOpacity:.85,weight:oos?2.5:1.5});
    m.bindPopup(popupHTML(c));m.on('click',()=>selectLead(c.id,true));m.addTo(LAYER);MARKERS[c.id]=m;pts.push([c.lat,c.lng]);});
  if(pts.length)MAP.fitBounds(pts,{padding:[30,30],maxZoom:13});
  const used=[...new Set(CARDS.flatMap(c=>c.trade_tags||[]).filter(Boolean))];
  $('#legend').innerHTML=(used.length?used.map(t=>'<span><i style="background:'+(TRADE_COLORS[t]||'#888')+'"></i>'+t+'</span>').join(''):Object.keys(ENTITY_COLORS).slice(0,4).map(e=>'<span><i style="background:'+ENTITY_COLORS[e]+'"></i>'+e+'</span>').join(''))+'<span><i style="background:var(--import)"></i>out-of-state owner</span>';
  renderMapNote();}
function renderMapNote(){const el=$('#mapnote');if(!el)return;
  const mapped=CARDS.filter(c=>c.lat&&c.lng).length;
  const permitUnmapped=CARDS.filter(c=>(c.has_permit||c.permit_count)&&!(c.lat&&c.lng)).length;
  if(permitUnmapped>0){el.className='mapnote';el.innerHTML='▲ '+p0(mapped)+' parcels plotted. <b>'+p0(permitUnmapped)+' permit leads are harvested but not yet geocoded</b> — run a harvest (Actions → "GRIT harvest") and the APN→parcel-centroid join lights them up across the valley. Owner mailing geography never determines a pin: an out-of-state owner still plots on the Las Vegas parcel.';}
  else{el.className='mapnote ok';el.innerHTML='● '+p0(mapped)+' leads plotted by property location. Pins are physical parcels — owner origin is tracked separately under Capital Flow.';}}
document.addEventListener('click',e=>{const d=e.target.closest&&e.target.closest('[data-det]');if(d){openDrawer(d.dataset.det);}});

/* ---------- playback ---------- */
let PLAY={on:false,cursor:0,min:0,max:0,gran:'month',timer:null,events:[]};
const GRAN_MS={day:864e5,week:6048e5,month:2592e6,year:31536e6};
function dms(d){const t=Date.parse((d||'').slice(0,10));return isNaN(t)?null:t;}
function buildPlayEvents(){const evs=[];
  filtered().forEach(c=>{(c.timeline||[]).forEach(e=>{
    const la=e.lat||c.lat,ln=e.lng||c.lng,t=dms(e.date);
    if(la&&ln&&t)evs.push({t,la,ln,kind:e.kind,color:(e.trade_tag&&TRADE_COLORS[e.trade_tag])||leadColor(c),id:c.id,addr:c.situs_address,desc:e.description});
  });});
  evs.sort((a,b)=>a.t-b.t);PLAY.events=evs;
  if(evs.length){PLAY.min=evs[0].t;PLAY.max=evs[evs.length-1].t;
    const span=PLAY.max-PLAY.min;PLAY.gran=span>9.4e10?'year':span>1.04e10?'month':span>2.6e9?'week':'day';
    PLAY.cursor=PLAY.max;}
  return evs;}
function renderPlayback(){const el=$('#playback');const evs=buildPlayEvents();
  if(!evs.length){el.innerHTML='<div class="pb-meta">Timeline replay needs mapped, dated events. Parcel sale events animate now; permit events join after a harvest geocodes them. <b>'+p0(CARDS.filter(c=>(c.has_permit||c.permit_count)&&!c.lat).length)+'</b> permit leads are queued.</div>';stopPlay();PLAYLAYER&&PLAYLAYER.clearLayers();return;}
  const grans=['day','week','month','year'];
  el.innerHTML='<div class="pb-row">'+
    '<div class="pb-play" id="pbplay">▶ PLAY</div>'+
    '<input type="range" class="pb-track" id="pbtrack" min="'+PLAY.min+'" max="'+PLAY.max+'" value="'+PLAY.cursor+'" step="86400000">'+
    '<div class="pb-gran" id="pbgran">'+grans.map(g=>'<span class="'+(g===PLAY.gran?'on':'')+'" data-g="'+g+'">'+g+'</span>').join('')+'</div>'+
    '<div class="pb-cursor" id="pbcursor"></div></div>'+
    '<div class="pb-meta" id="pbmeta"></div>';
  $('#pbplay').onclick=togglePlay;
  $('#pbtrack').oninput=(ev)=>{PLAY.cursor=+ev.target.value;stopPlay();drawPlay();};
  $('#pbgran').querySelectorAll('span').forEach(s=>s.onclick=()=>{PLAY.gran=s.dataset.g;$('#pbgran').querySelectorAll('span').forEach(x=>x.classList.toggle('on',x===s));drawPlay();});
  drawPlay();}
function drawPlay(){if(!PLAY.events.length)return;
  if(!MAP.hasLayer(PLAYLAYER)){MAP.removeLayer(LAYER);MAP.addLayer(PLAYLAYER);}
  PLAYLAYER.clearLayers();
  const win=GRAN_MS[PLAY.gran];let shown=0,fresh=0,val=0;
  const seen=filtered();const valById={};seen.forEach(c=>valById[c.id]=num(c.assessed_value)+num(c.permit_value_total));
  const valCounted={};
  PLAY.events.forEach(e=>{
    if(e.t>PLAY.cursor)return;shown++;
    const age=PLAY.cursor-e.t;const inWin=age<=win;
    if(inWin){fresh++;if(!valCounted[e.id]){val+=valById[e.id]||0;valCounted[e.id]=1;}}
    const r=inWin?7:3,op=inWin?.95:.28,w=inWin?2:1;
    const m=L.circleMarker([e.la,e.ln],{radius:r,color:e.color,fillColor:e.color,fillOpacity:op,weight:w,opacity:inWin?1:.4});
    if(inWin)m.bindPopup(popupHTML(seen.find(c=>c.id===e.id)||{situs_address:e.addr,score:'',id:e.id})),m.on('click',()=>selectLead(e.id,true));
    m.addTo(PLAYLAYER);});
  const tr=$('#pbtrack');if(tr)tr.value=PLAY.cursor;
  const d=new Date(PLAY.cursor);const lbl=PLAY.gran==='year'?d.getFullYear():PLAY.gran==='day'?d.toISOString().slice(0,10):d.toISOString().slice(0,7);
  const c=$('#pbcursor');if(c)c.textContent='▸ '+lbl;
  const meta=$('#pbmeta');if(meta)meta.innerHTML='<b>'+p0(shown)+'</b> events through '+d.toISOString().slice(0,10)+' · <b>'+p0(fresh)+'</b> in the trailing '+PLAY.gran+' · <b>'+money(val)+'</b> assessed value moving in-window. Money moving through Southern Nevada.';}
function togglePlay(){PLAY.on?stopPlay():startPlay();}
function startPlay(){if(!PLAY.events.length)return;PLAY.on=true;const b=$('#pbplay');if(b){b.textContent='❚❚ PAUSE';b.classList.add('playing');}
  if(PLAY.cursor>=PLAY.max)PLAY.cursor=PLAY.min;
  const step=Math.max((PLAY.max-PLAY.min)/120,GRAN_MS[PLAY.gran]/4);
  PLAY.timer=setInterval(()=>{PLAY.cursor=Math.min(PLAY.max,PLAY.cursor+step);drawPlay();if(PLAY.cursor>=PLAY.max)stopPlay();},420);}
function stopPlay(){PLAY.on=false;if(PLAY.timer){clearInterval(PLAY.timer);PLAY.timer=null;}const b=$('#pbplay');if(b){b.textContent='▶ PLAY';b.classList.remove('playing');}}
function exitPlay(){stopPlay();if(MAP&&PLAYLAYER&&MAP.hasLayer(PLAYLAYER)){MAP.removeLayer(PLAYLAYER);MAP.addLayer(LAYER);}}

/* ---------- list ---------- */
function listHTML(){const cols=[['score','SCORE','c-score'],['age_days','AGE','c-age'],['situs_address','ADDRESS','c-addr'],['owner_name','OWNER','c-owner'],['entity_type','ENTITY','c-ent'],['trade','TRADE','c-trade'],['assessed_value','VALUE','c-val']];
  const head='<div class="lhead">'+cols.map(c=>'<div class="'+c[2]+'" data-k="'+c[0]+'">'+c[1]+(SORT.k===c[0]?(SORT.dir>0?' ▲':' ▼'):'')+'</div>').join('')+'</div>';
  const rows=filtered().map(c=>{
    const tp=c.temporal_state?'<span class="pill t-'+c.temporal_state+'">'+c.temporal_state.charAt(0)+'</span>':'';
    const pp=c.portfolio_size>1?'<span class="pill port">P'+c.portfolio_size+'</span>':'';
    return '<div class="lrow'+(SEL===c.id?' sel':'')+'" data-id="'+esc(c.id)+'">'+
    '<div class="c-score"><span class="scoredot" style="background:'+leadColor(c)+'"></span>'+c.score+'</div>'+
    '<div class="c-age">'+ageCell(c)+'</div>'+
    '<div class="c-addr">'+tp+pp+esc(c.situs_address||'(unknown)')+(c.owner_out_of_state?'<span class="oos" title="out-of-state owner: '+esc(c.owner_origin_market||'')+'"></span>':'')+'</div>'+
    '<div class="c-owner">'+esc(c.owner_name||'—')+'</div>'+
    '<div class="c-ent" style="color:'+(ENTITY_COLORS[c.entity_type]||'#888')+'">'+(c.entity_type||'—')+'</div>'+
    '<div class="c-trade">'+((c.trade_tags||[])[0]||'—')+'</div>'+
    '<div class="c-val">'+esc(c.assessed_value||'—')+'</div></div>';
  }).join('');
  return head+'<div class="lbody">'+(rows||'<div class="empty" style="border:0">no leads match this filter</div>')+'</div>';}
function renderList(){[['#pane-list',480],['#pane-list2',640]].forEach(([sel,h])=>{const p=$(sel);if(!p)return;
  if(!CARDS.length){p.innerHTML='<div class="empty" style="border:0;height:'+h+'px;display:flex;flex-direction:column;justify-content:center"><div class="big">NO HARVEST YET</div>Run the GitHub Action: Actions → "GRIT harvest" → Run workflow.</div>';return;}
  p.innerHTML=listHTML();const lb=p.querySelector('.lbody');if(lb)lb.style.height=h+'px';
  p.querySelectorAll('.lhead div[data-k]').forEach(hh=>hh.onclick=()=>{const k=hh.dataset.k;SORT.dir=(SORT.k===k?-SORT.dir:(k==='age_days'?1:-1));SORT.k=k;renderList();});
  p.querySelectorAll('.lrow').forEach(r=>{r.onclick=()=>{selectLead(r.dataset.id,false);openDrawer(r.dataset.id);};});});}
function selectLead(id,fromMap){SEL=id;
  $$('.lrow').forEach(r=>r.classList.toggle('sel',r.dataset.id===id));
  const r=document.querySelector('.lrow[data-id="'+CSS.escape(id)+'"]');if(r)r.scrollIntoView({block:'nearest',behavior:'smooth'});
  const m=MARKERS[id];if(m&&MAP.hasLayer(LAYER)){if(!fromMap){MAP.panTo(m.getLatLng());}m.openPopup();}}

/* ---------- toolbar + facets ---------- */
function renderToolbar(){const trades=[...new Set(CARDS.flatMap(c=>c.trade_tags||[]).filter(Boolean))].sort();
  const states=['IMMEDIATE','WARM','PERSISTENT','HISTORICAL','STRUCTURAL'];
  const cnt={};states.forEach(s=>cnt[s]=CARDS.filter(c=>c.temporal_state===s).length);
  const lens='<span class="filt '+(!TFILTER?'on':'')+'" data-tlens="">all time</span>'+
             states.filter(s=>cnt[s]>0).map(s=>'<span class="filt '+(TFILTER===s?'on':'')+'" data-tlens="'+s+'" title="'+cnt[s]+'">'+s.toLowerCase()+'</span>').join('');
  let opPill='';
  if(OPFILTER){const op=(OPERATORS||[]).find(o=>o.id===OPFILTER);if(op)opPill='<span class="filt on" data-opclear="1" style="border-color:var(--amber);color:var(--amber);cursor:pointer">operator: '+esc(op.name)+' · '+op.parcel_count+'p ✕</span>';}
  let originPill='';
  if(ORIGIN_FILTER)originPill='<span class="filt on" data-originclear="1" style="border-color:var(--import);color:var(--import);cursor:pointer">origin: '+esc(ORIGIN_FILTER)+' ✕</span>';
  const html='<span class="tcount">'+po(filtered().length)+' leads</span>'+opPill+originPill+
    (trades.length?'<span class="filt '+(!FILTER?'on':'')+'" data-t="">all</span>'+trades.map(t=>'<span class="filt '+(FILTER===t?'on':'')+'" data-t="'+t+'">'+t+'</span>').join(''):'')+
    '<span class="sub">|</span>'+lens+
    '<span class="sub">|</span>'+
    '<button class="btn" data-hide="1">'+(HIDE_NONLEAD?'show HOA/gov':'hide HOA/gov')+'</button>'+
    '<button class="btn" data-csv="1">↓ CSV</button>';
  ['#toolbar','#toolbar2'].forEach(sel=>{const tb=$(sel);if(!tb)return;tb.innerHTML=html;
    tb.querySelectorAll('.filt[data-t]').forEach(el=>el.onclick=()=>{FILTER=el.dataset.t||null;refreshFilters();});
    tb.querySelectorAll('.filt[data-tlens]').forEach(el=>el.onclick=()=>{TFILTER=el.dataset.tlens||null;refreshFilters();});
    const oc=tb.querySelector('[data-opclear]');if(oc)oc.onclick=()=>{OPFILTER=null;refreshFilters();};
    const ogc=tb.querySelector('[data-originclear]');if(ogc)ogc.onclick=()=>{ORIGIN_FILTER=null;refreshFilters();};
    tb.querySelector('[data-csv]').onclick=exportCSV;
    tb.querySelector('[data-hide]').onclick=()=>{HIDE_NONLEAD=!HIDE_NONLEAD;refreshFilters();};});}
const po=p0; // alias to the real number formatter
function ageShort(days){if(days==null)return '';if(days<=0)return 'today';if(days===1)return '1d';if(days<14)return days+'d';if(days<60)return Math.floor(days/7)+'w';if(days<730)return Math.floor(days/30)+'mo';return Math.floor(days/365)+'y';}
function urg(c){return c.urgency||'none';}
function ageCell(c){const d=c.age_days;const lbl=d!=null?ageShort(d):(c.first_seen?'seen':'—');
  return '<span class="age u-'+urg(c)+'" title="'+(c.primary_date_kind?esc(c.primary_date_kind.toUpperCase()+' '+(c.primary_ago||'')):'first seen '+esc(c.first_seen||''))+'">'+lbl+'</span>';}
function renderFacets(){const counts={};
  CARDS.forEach(c=>(c.tags||[]).forEach(t=>{counts[t]=(counts[t]||0)+1;}));
  const byNs={};Object.keys(counts).forEach(t=>{const ns=t.split(':')[0];(byNs[ns]=byNs[ns]||[]).push(t);});
  const order=NS_ORDER.filter(ns=>byNs[ns]).concat(Object.keys(byNs).filter(ns=>!NS_ORDER.includes(ns)));
  const html=order.map(ns=>{
    const tags=byNs[ns].sort((a,b)=>counts[b]-counts[a]);
    return '<div class="fgroup"><div class="fh">'+esc(NS_LABELS[ns]||ns)+'</div><div class="fchips">'+
      tags.map(t=>{const lbl=t.split(':').slice(1).join(':');const on=TAGSET.has(t);
        return '<span class="fchip'+(ns==='origin'?' og':'')+(on?' on':'')+'" data-tag="'+esc(t)+'">'+esc(lbl)+'<span class="n">'+counts[t]+'</span></span>';}).join('')+
      '</div></div>';}).join('');
  ['#facets','#facets2'].forEach(sel=>{const f=$(sel);if(!f)return;f.innerHTML=html;
    f.querySelectorAll('.fchip').forEach(ch=>ch.onclick=()=>{const t=ch.dataset.tag;TAGSET.has(t)?TAGSET.delete(t):TAGSET.add(t);refreshFilters();});});
  const lbl=TAGSET.size?('· '+TAGSET.size+' active'):'';

  const gaps=(ga.gaps||[]).map(g=>'<div class="gap '+g.priority+'"><div class="gp">'+esc(g.priority)+' PRIORITY</div><b>'+esc(g.gap)+'</b><div class="gi">'+esc(g.impact||'')+'</div></div>').join('');
  const road=(ga.v107_roadmap||[]).map(r=>'<li>'+esc(r)+'</li>').join('');
  const gaBlock='<h2 class="sec">Gap Analysis &amp; Roadmap <span class="note">the distance to complete Southern Nevada coverage</span></h2>'+gaps+
    (road?'<h2 class="sec" style="margin-top:14px">Next coverage targets</h2><ul class="roadmap">'+road+'</ul>':'');
  v.innerHTML=crBlock+confBlock+dnBlock+siTbl+smBlock+pBlock+dqBlock+onBlock+gaBlock;}

/* ---------- KPIs + tabs ---------- */
function renderKPIs(){const h=(COV&&COV.headline)||{};
  const mapped=CARDS.filter(c=>c.lat&&c.lng).length;
  const fresh=CARDS.filter(c=>c.urgency==='hot'||c.urgency==='warm').length;
  const k=(cls,v,l,s,tab,extra)=>'<div class="kpi '+cls+(tab||extra?' clk':'')+'"'+(tab?' data-tab="'+tab+'"':'')+(extra?' '+extra:'')+'><div class="v">'+v+'</div><div class="l">'+l+'</div>'+(s?'<div class="s">'+s+'</div>':'')+'</div>';
  $('#kpis').innerHTML=
    k('',po(CARDS.length),'Leads','warehouse','leads')+
    k('k-permit',po(h.permit_events||0),'Permit events',(h.permit_newest?'newest '+h.permit_newest:'live CLV feed'),'coverage')+
    k('',po(mapped),'Mapped',(CARDS.filter(c=>(c.has_permit||c.permit_count)&&!c.lat).length?po(CARDS.filter(c=>(c.has_permit||c.permit_count)&&!c.lat).length)+' awaiting geocode':'all property pins'),'map')+
    k('k-permit',po(fresh),'Active ≤30d','freshest leads first','',`data-fresh="1"`)+
    k('k-import',po(h.imported_capital||0),'Imported capital',(h.owner_markets||0)+' origin markets','capital')+
    k('',po(h.contractors||0),'Contractors','live permit pullers','contractors')+
    k('',h.jurisdictions||0,'SoNV jurisdictions','property footprint','coverage');
  $('#kpis').querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>switchTab(el.dataset.tab));
  const fk=$('#kpis').querySelector('[data-fresh]');if(fk)fk.onclick=()=>{SORT={k:'age_days',dir:1};switchTab('leads');};}
const TABS=[['map','Map'],['contact','Contactability'],['leads','Leads'],['capital','Capital Flow'],['contractors','Contractors'],['operators','Operators'],['coverage','Coverage'],['audit','Audit']];
function renderTabs(){$('#tabs').innerHTML=TABS.map(([id,lbl],i)=>{
  const b=id==='leads'?CARDS.length:id==='contractors'?CONTRACTORS.length:id==='operators'?OPERATORS.length:id==='contact'?CARDS.filter(c=>c.contact&&c.contact.reachable).length:id==='capital'?((COV&&COV.headline&&COV.headline.imported_capital)||''):'';
  return '<div class="tab'+(i===0?' on':'')+'" data-tab="'+id+'">'+lbl+(b!==''&&b!=null?'<span class="b">'+po(b)+'</span>':'')+'</div>';}).join('');
  $('#tabs').querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));}
function switchTab(id){if(id==='map')ORIGIN_FILTER=null;
  $$('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===id));
  $$('.view').forEach(v=>v.classList.remove('on'));$('#v-'+id).classList.add('on');
  if(id!=='map')exitPlay();
  if(id==='map'){renderToolbar();renderFacets();renderList();renderMap();renderPlayback();setTimeout(()=>MAP&&MAP.invalidateSize(),60);}
  else if(id==='contact'){renderContact();}
  else if(id==='leads'){renderToolbar();renderFacets();renderList();}
  else if(id==='capital'&&!RENDERED.capital){renderCapital();RENDERED.capital=1;}
  else if(id==='capital'){renderCapital();}
  else if(id==='contractors'){renderContractors();}
  else if(id==='operators'){renderOperators();}
  else if(id==='coverage'){renderCoverage();}
  else if(id==='audit'){renderAudit();}}

/* ---------- boot ---------- */
(async()=>{initMap();
  const cd=await loadJSON('data/cards.json');CARDS=(cd&&cd.cards)||[];CARDS.forEach((c,i)=>{if(!c.id)c.id='c'+i;});
  HARVEST=cd&&cd.harvest;
  if(cd&&cd.version)$('#ver').textContent='INTELLIGENCE CONSOLE · SOUTHERN NEVADA · v'+cd.version;
  const od=await loadJSON('data/operators.json');OPERATORS=(od&&od.operators)||[];
  const ct=await loadJSON('data/contractors.json');CONTRACTORS=(ct&&ct.contractors)||[];
  COV=await loadJSON('data/coverage.json');
  if(COV&&COV.generated_at)$('#stamp').textContent='warehouse '+COV.generated_at;
  else if(cd&&cd.generated_at)$('#stamp').textContent='harvest '+cd.generated_at;
  renderKPIs();renderTabs();
  renderToolbar();renderFacets();renderList();renderMap();renderPlayback();
})();
</script>
</body>
</html>
